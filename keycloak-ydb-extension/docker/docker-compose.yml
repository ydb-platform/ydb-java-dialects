version: '3.4'

volumes:
  ydb_data:
    driver: local
  ydb_certs:
    driver: local

networks:
  keycloak:
    driver: bridge

services:
  ydb:
    image: ydbplatform/local-ydb:latest
    platform: linux/amd64
    ports:
      - '2135:2135'  # GRPC TLS
      - '2136:2136'  # GRPC
      - '8765:8765'  # Monitoring UI
      - '9092:9092'  # Kafka Proxy
    volumes:
      - 'ydb_certs:/ydb_certs'
      - 'ydb_data:/ydb_data'
    networks:
      - keycloak
    environment:
      - GRPC_TLS_PORT=2135
      - GRPC_PORT=2136
      - MON_PORT=8765
      - YDB_KAFKA_PROXY_PORT=9092
    healthcheck:
      test: ["CMD", "ydb", "--endpoint", "grpc://localhost:2136", "--database", "/local", "scheme", "ls"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    volumes:
      - ./providers/keycloak-ydb-extension-1.0-SNAPSHOT.jar:/opt/keycloak/providers/keycloak-ydb-extension-1.0-SNAPSHOT.jar
      - ./conf/keycloak.conf:/opt/keycloak/conf/keycloak.conf
    entrypoint: /opt/keycloak/bin/kc.sh
    command: >
      -v start-dev
      --cache=local
    ports:
      - 9090:8080
    networks:
      - keycloak
    depends_on:
      ydb:
        condition: service_started
