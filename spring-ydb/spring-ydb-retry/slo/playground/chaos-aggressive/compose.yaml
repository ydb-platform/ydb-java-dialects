networks:
  slo-network:
    driver: bridge

x-ydb-node: &ydb-node
  image: cr.yandex/crptqonuodf51kdj7a7d/ydb:24.4.4.12
  restart: always
  platform: linux/amd64
  privileged: true
  networks:
    - slo-network
  volumes:
    - ../configs/ydb.yaml:/opt/ydb/cfg/config.yaml
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 768M
      reservations:
        cpus: '0.5'
        memory: 512M

name: ydb-slo

services:
  static-0:
    <<: *ydb-node
    container_name: ydb-static-0
    hostname: static-0
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2135"
      - --mon-port
      - "8765"
      - --ic-port
      - "19001"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --node
      - static
      - --label
      - deployment=docker
    ports:
      - "2135:2135"
      - "8765:8765"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2135"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s

  static-init:
    <<: *ydb-node
    restart: on-failure
    container_name: ydb-static-init
    command:
      - /opt/ydb/bin/ydbd
      - -s
      - grpc://static-0:2135
      - admin
      - blobstorage
      - config
      - init
      - --yaml-file
      - /opt/ydb/cfg/config.yaml
    depends_on:
      static-0:
        condition: service_healthy

  tenant-init:
    <<: *ydb-node
    restart: on-failure
    container_name: ydb-tenant-init
    command:
      - /opt/ydb/bin/ydbd
      - -s
      - grpc://static-0:2135
      - admin
      - database
      - /Root/testdb
      - create
      - ssd:1
    depends_on:
      static-init:
        condition: service_completed_successfully

  database-1:
    <<: *ydb-node
    container_name: ydb-database-1
    hostname: database-1
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2136"
      - --mon-port
      - "8766"
      - --ic-port
      - "19002"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --tenant
      - /Root/testdb
      - --node-broker
      - grpc://static-0:2135
      - --label
      - deployment=docker
    ports:
      - "2136:2136"
      - "8766:8766"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2136"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    depends_on:
      static-0:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      tenant-init:
        condition: service_completed_successfully

  database-2:
    <<: *ydb-node
    container_name: ydb-database-2
    hostname: database-2
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2137"
      - --mon-port
      - "8767"
      - --ic-port
      - "19003"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --tenant
      - /Root/testdb
      - --node-broker
      - grpc://static-0:2135
      - --label
      - deployment=docker
    ports:
      - "2137:2137"
      - "8767:8767"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2137"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    depends_on:
      static-0:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      tenant-init:
        condition: service_completed_successfully

  database-3:
    <<: *ydb-node
    container_name: ydb-database-3
    hostname: database-3
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2138"
      - --mon-port
      - "8768"
      - --ic-port
      - "19004"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --tenant
      - /Root/testdb
      - --node-broker
      - grpc://static-0:2135
      - --label
      - deployment=docker
    ports:
      - "2138:2138"
      - "8768:8768"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2138"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    depends_on:
      static-0:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      tenant-init:
        condition: service_completed_successfully

  database-4:
    <<: *ydb-node
    container_name: ydb-database-4
    hostname: database-4
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2139"
      - --mon-port
      - "8769"
      - --ic-port
      - "19005"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --tenant
      - /Root/testdb
      - --node-broker
      - grpc://static-0:2135
      - --label
      - deployment=docker
    ports:
      - "2139:2139"
      - "8769:8769"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2139"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    depends_on:
      static-0:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      tenant-init:
        condition: service_completed_successfully

  database-5:
    <<: *ydb-node
    container_name: ydb-database-5
    hostname: database-5
    command:
      - /opt/ydb/bin/ydbd
      - server
      - --grpc-port
      - "2140"
      - --mon-port
      - "8770"
      - --ic-port
      - "19006"
      - --yaml-config
      - /opt/ydb/cfg/config.yaml
      - --tenant
      - /Root/testdb
      - --node-broker
      - grpc://static-0:2135
      - --label
      - deployment=docker
    ports:
      - "2140:2140"
      - "8770:8770"
    healthcheck:
      test: bash -c "exec 6<> /dev/tcp/localhost/2140"
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 30s
    depends_on:
      static-0:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      tenant-init:
        condition: service_completed_successfully

  app-with-retry:
    build:
      context: ../../../..
      dockerfile: spring-ydb-retry/slo/Dockerfile
    container_name: ydb-app-with-retry
    platform: linux/amd64
    networks:
      - slo-network
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: jdbc:ydb:grpc://static-0:2135/Root/testdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: tech.ydb.jdbc.YdbDriver
      YDB_TRANSACTION_RETRY_ENABLED: "true"
      YDB_TRANSACTION_RETRY_MAX_RETRIES: "10"
      REF: with-retry
      SLO_RUN_ID: ${SLO_RUN_ID:-}
      SLO_RESULTS_DIR: /app/results
      SLO_READ_RPS: "100"
      SLO_WRITE_RPS: "100"
      SLO_INITIAL_DATA: "1000"
      SLO_TIME: "600"
    volumes:
      - ../results:/app/results
    depends_on:
      static-0:
        condition: service_healthy

  app-no-retry:
    build:
      context: ../../../..
      dockerfile: spring-ydb-retry/slo/Dockerfile
    container_name: ydb-app-no-retry
    platform: linux/amd64
    networks:
      - slo-network
    environment:
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: jdbc:ydb:grpc://static-0:2135/Root/testdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: tech.ydb.jdbc.YdbDriver
      YDB_TRANSACTION_RETRY_ENABLED: "false"
      REF: no-retry
      SLO_RUN_ID: ${SLO_RUN_ID:-}
      SLO_RESULTS_DIR: /app/results
      SLO_READ_RPS: "100"
      SLO_WRITE_RPS: "100"
      SLO_INITIAL_DATA: "1000"
      SLO_TIME: "600"
    volumes:
      - ../results:/app/results
    depends_on:
      static-0:
        condition: service_healthy

  chaos:
    image: docker:latest
    restart: on-failure
    container_name: ydb-chaos
    platform: linux/amd64
    networks:
      - slo-network
    entrypoint: ["/bin/sh", "-c", "chmod +x /opt/ydb/chaos.sh && /opt/ydb/chaos.sh"]
    volumes:
      - ./chaos.sh:/opt/ydb/chaos.sh
      - ../configs/ydb.yaml:/opt/ydb/cfg/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      static-0:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: prometheus
    networks:
      - slo-network
    volumes:
      - ../configs/prometheus:/etc/prometheus
      - ../data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-otlp-receiver'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:9.5.3
    container_name: grafana
    networks:
      - slo-network
    volumes:
      - ../configs/grafana/provisioning:/etc/grafana/provisioning
      - ../data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
