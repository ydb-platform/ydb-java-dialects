name: Keycloak YDB Extension CI with Maven

on:
  push:
    branches:
      - main
    paths:
      - 'keycloak-ydb-extension/**'
      - 'hibernate-dialect/**'
  pull_request:
    paths:
      - 'keycloak-ydb-extension/**'
      - 'hibernate-dialect/**'

env:
  MAVEN_ARGS: --batch-mode --update-snapshots -Dstyle.color=always

jobs:
  build:
    name: Keycloak YDB Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Hibernate Dialect (Hibernate 7)
        working-directory: ./hibernate-dialect
        run: mvn $MAVEN_ARGS install

      - name: Download dependencies
        working-directory: ./keycloak-ydb-extension
        run: mvn $MAVEN_ARGS dependency:go-offline

      - name: Build & test (unit + Keycloak model tests with YDB)
        working-directory: ./keycloak-ydb-extension
        run: mvn $MAVEN_ARGS verify
